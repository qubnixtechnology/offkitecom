$kind: http-request
method: PUT
url: '{{baseUrl}}/profile'
order: 2000
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
body:
  type: json
  content: |-
    {
      "name": "Updated Test User"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Update profile returns success', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 202]);
      });
