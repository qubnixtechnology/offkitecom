$kind: http-request
method: GET
url: '{{baseUrl}}/orders'
order: 4000
headers:
  - key: Accept
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('List orders returns success', function () {
        pm.expect(pm.response.code).to.equal(200);
      });
