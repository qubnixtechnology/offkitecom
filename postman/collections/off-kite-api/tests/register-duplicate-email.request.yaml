$kind: http-request
method: POST
url: '{{baseUrl}}/register'
order: 1000
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Duplicate User",
      "email": "{{userEmail}}",
      "password": "{{userPassword}}",
      "password_confirmation": "{{userPassword}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Duplicate email is rejected', function () {
        pm.expect(pm.response.code).to.be.oneOf([409, 422]);
      });
