$kind: http-request
method: POST
url: '{{baseUrl}}/register'
order: 9000
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "<script>alert('xss')</script>",
      "email": "test' OR 1=1 --@example.com",
      "password": "Password123!",
      "password_confirmation": "Password123!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('SQL injection or XSS payload is not accepted as auth bypass', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 422]);
      });
      if (pm.response.code < 400) {
        const data = pm.response.json();
        pm.test('No elevated auth granted unexpectedly', function () {
          pm.expect(data.token || data.access_token || '').to.be.a('string');
        });
      }
