$kind: http-request
method: GET
url: '{{baseUrl}}/profile'
order: 3000
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Protected route without token returns 401', function () {
        pm.expect(pm.response.code).to.equal(401);
      });
