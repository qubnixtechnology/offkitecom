$kind: http-request
method: POST
url: '{{baseUrl}}/login'
order: 2000
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{userEmail}}",
      "password": "wrong-password"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Wrong credentials are rejected', function () {
        pm.expect(pm.response.code).to.be.oneOf([401, 422]);
      });
