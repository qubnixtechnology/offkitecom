$kind: http-request
method: POST
url: '{{baseUrl}}/logout'
order: 3000
headers:
  - key: Accept
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Logout returns success', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
