$kind: http-request
method: GET
url: '{{baseUrl}}/products/{{productId}}'
order: 2000
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Get product by ID returns success', function () {
        pm.expect(pm.response.code).to.equal(200);
      });
