$kind: http-request
method: GET
url: '{{baseUrl}}/products?page=2&per_page=5'
order: 3000
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Paginated products returns success', function () {
        pm.expect(pm.response.code).to.equal(200);
      });
      const data = pm.response.json();
      const meta = data.meta || data.pagination || data;
      pm.test('Pagination meta exists', function () {
        pm.expect(meta).to.be.an('object');
      });
      pm.test('Pagination has current page info', function () {
        pm.expect(meta.current_page || meta.page || meta.currentPage).to.exist;
      });
      pm.test('Pagination has total info', function () {
        pm.expect(meta.total || meta.total_items || meta.totalItems).to.exist;
      });
